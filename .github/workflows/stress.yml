name: Stress

# Opt-in load suite. Heavy (spins MongoDB + Redis, runs k6 for several
# minutes), so it is manual-only rather than gating every push/PR. Latency
# thresholds are not yet calibrated, so P95_MAX is set generously and the run
# gates on correctness (checks + http_req_failed) only.
on:
  workflow_dispatch:
    inputs:
      vus:
        description: Base virtual users per scenario
        default: "10"
      duration:
        description: Steady-state hold per scenario
        default: "30s"

permissions:
  contents: read

# Serialize per ref but never cancel an in-flight load run.
concurrency:
  group: stress-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stress:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mongo:
        image: mongo:7
        # The auth config requires credentials (Username/Password/AuthSource),
        # so the server cannot talk to a no-auth Mongo — enable root auth here
        # and mirror it in ci.env below.
        env:
          MONGO_INITDB_ROOT_USERNAME: stress
          MONGO_INITDB_ROOT_PASSWORD: stress
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet -u stress -p stress --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Ensure node binary (act only)
        if: ${{ env.ACT == 'true' }}
        run: command -v node || apt-get install -y nodejs
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Setup auth server env
        uses: ./.github/actions/setup-auth-server
        with:
          client-id: smoke-client
          jwt-kid: stress
          repository-used: mongo
          redirect-uris: https://app.example.com/callback
          post-logout-redirect-allowlist: https://app.example.com/logged-out
          extra-env: |
            MONGO_HOST=localhost:27017
            MONGO_USER=stress
            MONGO_PASSWORD=stress
            MONGO_AUTH_SOURCE=admin
            MONGO_DATABASE=stress
            REDIS_ADDR=localhost:6379
            RATE_LIMIT_PER_MIN=0

      - name: Build server
        run: go build -o bin/auth ./cmd/auth

      - name: Install k6
        run: |
          curl -sSfLO "https://github.com/grafana/k6/releases/download/v2.1.0/k6-v2.1.0-linux-amd64.tar.gz"
          echo "295d961ebfca306f295f1133068dcd403a8171c87f387928f5f30b0fbcff858a  k6-v2.1.0-linux-amd64.tar.gz" | sha256sum -c -
          tar -xzf k6-v2.1.0-linux-amd64.tar.gz -C /usr/local/bin --strip-components=1 k6-v2.1.0-linux-amd64/k6
          rm k6-v2.1.0-linux-amd64.tar.gz

      - name: Run stress scenarios
        env:
          ENV_PATH: ${{ github.workspace }}/ci.env
          VUS: ${{ github.event.inputs.vus }}
          DURATION: ${{ github.event.inputs.duration }}
          # Uncalibrated latencies on shared CI runners: gate on errors, not p95.
          P95_MAX: "5000"
        run: |
          ./bin/auth > /tmp/server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9876/.well-known/openid-configuration > /dev/null 2>&1 && break
            sleep 1
          done
          set -e
          k6 run -e VUS="$VUS"          -e DURATION="$DURATION" stress_test/token_refresh.js
          k6 run -e VUS="$((VUS * 2))"  -e DURATION="$DURATION" stress_test/userinfo.js
          k6 run -e VUS="$VUS"          -e DURATION="$DURATION" stress_test/auth_code_flow.js
          k6 run -e VUS="$VUS"          -e DURATION="$DURATION" stress_test/mixed.js
          k6 run -e BASELINE="$VUS"     -e SPIKE="$((VUS * 4))"  stress_test/spike.js
          k6 run -e VUS="$VUS"          -e DURATION="$DURATION" stress_test/soak.js

      - name: Show server log
        if: always()
        run: cat /tmp/server.log || true
