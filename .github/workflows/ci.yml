name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

# Cancel superseded runs for the same ref so rapid pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Ensure node binary (act only)
        if: ${{ env.ACT == 'true' }}
        run: command -v node || apt-get install -y nodejs
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        if: ${{ env.ACT != 'true' }}
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ hashFiles('.golangci.yml') }}
          restore-keys: golangci-lint-${{ runner.os }}-
      - name: Install golangci-lint
        run: |
          curl -sSfLO "https://github.com/golangci/golangci-lint/releases/download/v2.12.2/golangci-lint-2.12.2-linux-amd64.tar.gz"
          echo "8df580d2670fed8fa984aac0507099af8df275e665215f5c7a2ae3943893a553  golangci-lint-2.12.2-linux-amd64.tar.gz" | sha256sum -c -
          tar -xzf golangci-lint-2.12.2-linux-amd64.tar.gz -C /usr/local/bin --strip-components=1 golangci-lint-2.12.2-linux-amd64/golangci-lint
          rm golangci-lint-2.12.2-linux-amd64.tar.gz
      - run: golangci-lint run

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Ensure node binary (act only)
        if: ${{ env.ACT == 'true' }}
        run: command -v node || apt-get install -y nodejs
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - run: go mod verify
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  # Runs the backend-parity tests against a real MongoDB + Redis. The repo tests
  # skip the gated cases unless MONGO_* / REDIS_* is set (see requireMongo,
  # requireRedis), so this job is where they actually execute.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongo:
        # Atlas Local initializes a single-node replica set out of the box —
        # required by the UnitOfWork transaction tests (WithTransaction needs
        # a replica set). Credentials mirrored in the test env below.
        image: mongodb/mongodb-atlas-local:8.2.4
        env:
          MONGODB_INITDB_ROOT_USERNAME: test
          MONGODB_INITDB_ROOT_PASSWORD: test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet -u test -p test --eval 'db.hello().isWritablePrimary ? quit(0) : quit(1)'"
          --health-interval 10s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Ensure node binary (act only)
        if: ${{ env.ACT == 'true' }}
        run: command -v node || apt-get install -y nodejs
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Run integration tests
        env:
          MONGO_HOST: localhost:27017
          MONGO_USER: test
          MONGO_PASSWORD: test
          MONGO_AUTH_SOURCE: admin
          REDIS_ADDR: localhost:6379
        run: go test ./... -run 'Mongo|RedisCache_Contract'

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      # Sidecar SMTP sink so the forgot-password flow can be asserted end-to-end:
      # the IdP sends to :1025, the test reads the reset link back via the API on :8025.
      mailpit:
        image: axllent/mailpit:v1.30
        ports:
          - 1025:1025
          - 8025:8025
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Ensure node binary (act only)
        if: ${{ env.ACT == 'true' }}
        run: command -v node || apt-get install -y nodejs
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Setup auth server env
        uses: ./.github/actions/setup-auth-server
        with:
          client-id: my_client
          client-auth-method: client_secret_basic
          client-secret: super-secret-e2e-client-secret
          redirect-uris: http://localhost:3000/callback
          post-logout-redirect-allowlist: http://localhost:3000
          extra-env: |
            SMTP_HOST=localhost
            SMTP_PORT=1025
            SMTP_FROM=noreply@auth.local
            APP_BASE_URL=http://localhost:3000

      - name: Build server
        run: go build -o bin/auth ./cmd/auth

      - name: Wait for Mailpit
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8025/api/v1/info >/dev/null && { echo "Mailpit ready"; exit 0; }
            sleep 1
          done
          echo "Mailpit did not become ready" >&2; exit 1

      - name: Run e2e tests
        env:
          ENV_PATH: ${{ github.workspace }}/ci.env
        run: |
          ./bin/auth > /tmp/server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          bash e2e/test_auth.sh

      - name: Show server log
        if: always()
        run: cat /tmp/server.log || true

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Ensure node binary (act only)
        if: ${{ env.ACT == 'true' }}
        run: command -v node || apt-get install -y nodejs
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Setup auth server env
        uses: ./.github/actions/setup-auth-server
        with:
          client-id: smoke-client
          redirect-uris: https://app.example.com/callback
          post-logout-redirect-allowlist: http://localhost:3000,https://app.example.com/logged-out

      - name: Build server
        run: go build -o bin/auth ./cmd/auth

      - name: Install k6
        run: |
          curl -sSfLO "https://github.com/grafana/k6/releases/download/v2.1.0/k6-v2.1.0-linux-amd64.tar.gz"
          echo "295d961ebfca306f295f1133068dcd403a8171c87f387928f5f30b0fbcff858a  k6-v2.1.0-linux-amd64.tar.gz" | sha256sum -c -
          tar -xzf k6-v2.1.0-linux-amd64.tar.gz -C /usr/local/bin --strip-components=1 k6-v2.1.0-linux-amd64/k6
          rm k6-v2.1.0-linux-amd64.tar.gz

      - name: Run smoke tests
        env:
          ENV_PATH: ${{ github.workspace }}/ci.env
        run: |
          ./bin/auth > /tmp/server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9876/.well-known/openid-configuration > /dev/null 2>&1 && break
            sleep 1
          done
          k6 run smoke_test/all.js

      - name: Show server log
        if: always()
        run: cat /tmp/server.log || true

  vuln:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Ensure node binary (act only)
        if: ${{ env.ACT == 'true' }}
        run: command -v node || apt-get install -y nodejs
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
      - run: govulncheck ./...

  licenses:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Ensure node binary (act only)
        if: ${{ env.ACT == 'true' }}
        run: command -v node || apt-get install -y nodejs
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@v1.6.0
      - run: go-licenses check ./... --disallowed_types=restricted,forbidden

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfLO "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz"
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks_8.30.1_linux_x64.tar.gz" | sha256sum -c -
          tar -xzf gitleaks_8.30.1_linux_x64.tar.gz -C /usr/local/bin gitleaks
          rm gitleaks_8.30.1_linux_x64.tar.gz
      - name: Scan for secrets
        run: gitleaks detect --source . --redact
