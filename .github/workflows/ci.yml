name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

# Cancel superseded runs for the same ref so rapid pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Ensure node binary (act only)
        if: ${{ env.ACT == 'true' }}
        run: command -v node || apt-get install -y nodejs
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: ${{ env.ACT != 'true' }}
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ hashFiles('.golangci.yml') }}
          restore-keys: golangci-lint-${{ runner.os }}-
      - name: Install golangci-lint
        run: |
          curl -sSfL "https://github.com/golangci/golangci-lint/releases/download/v2.12.2/golangci-lint-2.12.2-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin --strip-components=1 golangci-lint-2.12.2-linux-amd64/golangci-lint
      - run: golangci-lint run

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Ensure node binary (act only)
        if: ${{ env.ACT == 'true' }}
        run: command -v node || apt-get install -y nodejs
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - run: go mod verify
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  # Runs the backend-parity tests against a real MongoDB + Redis. The repo tests
  # skip the gated cases unless MONGO_* / REDIS_* is set (see requireMongo,
  # requireRedis), so this job is where they actually execute.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mongo:
        image: mongo:7
        # The Mongo config requires credentials; enable root auth and mirror
        # it in the test env below.
        env:
          MONGO_INITDB_ROOT_USERNAME: test
          MONGO_INITDB_ROOT_PASSWORD: test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet -u test -p test --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Ensure node binary (act only)
        if: ${{ env.ACT == 'true' }}
        run: command -v node || apt-get install -y nodejs
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Run integration tests
        env:
          MONGO_HOST: localhost:27017
          MONGO_USER: test
          MONGO_PASSWORD: test
          MONGO_AUTH_SOURCE: admin
          REDIS_ADDR: localhost:6379
        run: go test ./... -run 'Mongo|RedisCache_Contract'

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      # Sidecar SMTP sink so the forgot-password flow can be asserted end-to-end:
      # the IdP sends to :1025, the test reads the reset link back via the API on :8025.
      mailpit:
        image: axllent/mailpit:v1.30
        ports:
          - 1025:1025
          - 8025:8025
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Ensure node binary (act only)
        if: ${{ env.ACT == 'true' }}
        run: command -v node || apt-get install -y nodejs
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Generate RSA key pair
        run: |
          mkdir -p ci-keys
          openssl genrsa -out ci-keys/private_key.pem 2048
          openssl rsa -in ci-keys/private_key.pem -pubout -out ci-keys/public_key.pem

      - name: Write CI .env
        run: |
          cat > ci.env << EOF
          PORT=:9876
          PRIVATE_KEY_PATH=$GITHUB_WORKSPACE/ci-keys/private_key.pem
          PUBLIC_KEY_PATH=$GITHUB_WORKSPACE/ci-keys/public_key.pem
          JWT_KID=ci
          JWT_ISSUER=http://127.0.0.1:9876
          REPOSITORY_USED=file
          FILE_DIR=$GITHUB_WORKSPACE/tmp
          USER_FILE_PATH=user.json
          OAUTH_CLIENT_ID=my_client
          OAUTH_CLIENT_AUTH_METHOD=client_secret_basic
          OAUTH_CLIENT_SECRET=super-secret-e2e-client-secret
          OAUTH_CLIENT_REDIRECT_URIS=http://localhost:3000/callback
          OAUTH_POST_LOGOUT_REDIRECT_ALLOWLIST=http://localhost:3000
          METRICS_ADDR=127.0.0.1:9878
          EMAIL_ENCRYPTION_KEY=$(openssl rand -base64 32)
          EMAIL_BLIND_INDEX_KEY=$(openssl rand -base64 32)
          SMTP_HOST=localhost
          SMTP_PORT=1025
          SMTP_FROM=noreply@auth.local
          APP_BASE_URL=http://localhost:3000
          EOF

      - name: Build server
        run: go build -o bin/auth ./cmd/auth

      - name: Wait for Mailpit
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8025/api/v1/info >/dev/null && { echo "Mailpit ready"; exit 0; }
            sleep 1
          done
          echo "Mailpit did not become ready" >&2; exit 1

      - name: Run e2e tests
        env:
          ENV_PATH: ${{ github.workspace }}/ci.env
        run: |
          ./bin/auth > /tmp/server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          bash e2e/test_auth.sh

      - name: Show server log
        if: always()
        run: cat /tmp/server.log || true

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Ensure node binary (act only)
        if: ${{ env.ACT == 'true' }}
        run: command -v node || apt-get install -y nodejs
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Generate RSA key pair
        run: |
          mkdir -p ci-keys
          openssl genrsa -out ci-keys/private_key.pem 2048
          openssl rsa -in ci-keys/private_key.pem -pubout -out ci-keys/public_key.pem

      - name: Write CI .env
        run: |
          cat > ci.env << EOF
          PORT=:9876
          PRIVATE_KEY_PATH=$GITHUB_WORKSPACE/ci-keys/private_key.pem
          PUBLIC_KEY_PATH=$GITHUB_WORKSPACE/ci-keys/public_key.pem
          JWT_KID=ci
          JWT_ISSUER=http://127.0.0.1:9876
          REPOSITORY_USED=file
          FILE_DIR=$GITHUB_WORKSPACE/tmp
          USER_FILE_PATH=user.json
          OAUTH_CLIENT_ID=smoke-client
          OAUTH_CLIENT_REDIRECT_URIS=https://app.example.com/callback
          OAUTH_POST_LOGOUT_REDIRECT_ALLOWLIST=http://localhost:3000,https://app.example.com/logged-out
          METRICS_ADDR=127.0.0.1:9878
          EMAIL_ENCRYPTION_KEY=$(openssl rand -base64 32)
          EMAIL_BLIND_INDEX_KEY=$(openssl rand -base64 32)
          EOF

      - name: Build server
        run: go build -o bin/auth ./cmd/auth

      - name: Install k6
        run: |
          curl -sSfL "https://github.com/grafana/k6/releases/download/v2.0.0/k6-v2.0.0-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin --strip-components=1 k6-v2.0.0-linux-amd64/k6

      - name: Run smoke tests
        env:
          ENV_PATH: ${{ github.workspace }}/ci.env
        run: |
          ./bin/auth > /tmp/server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9876/.well-known/openid-configuration > /dev/null 2>&1 && break
            sleep 1
          done
          k6 run smoke_test/all.js

      - name: Show server log
        if: always()
        run: cat /tmp/server.log || true

  vuln:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Ensure node binary (act only)
        if: ${{ env.ACT == 'true' }}
        run: command -v node || apt-get install -y nodejs
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
      - run: govulncheck ./...

  licenses:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - name: Ensure node binary (act only)
        if: ${{ env.ACT == 'true' }}
        run: command -v node || apt-get install -y nodejs
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@v1.6.0
      - run: go-licenses check ./... --disallowed_types=restricted,forbidden

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" | tar -xz -C /usr/local/bin gitleaks
      - name: Scan for secrets
        run: gitleaks detect --source . --redact
